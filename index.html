<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Base64 Encoder Tool</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; justify-content: center; padding: 2rem; }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1rem; }
        
        #dropZone { border: 2px dashed #444; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        #dropZone:hover { border-color: #fff; }
        
        textarea { height: 150px; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; resize: vertical; }
        img#preview { max-width: 100%; margin-top: 10px; border: 1px solid #333; display: none; }
        button { padding: 10px; cursor: pointer; background: #fff; color: #000; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 Encoder</h1>
        <div id="dropZone">Drag & Drop atau Klik di sini untuk memilih gambar</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        
        <img id="preview" alt="Preview">
        <textarea id="output" readonly placeholder="Base64 string akan muncul di sini..."></textarea>
        <button id="copyBtn">Copy Base64</button>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const preview = document.getElementById('preview');
        const copyBtn = document.getElementById('copyBtn');

        const processFile = (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                output.value = e.target.result;
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => processFile(e.target.files[0]);
        
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#fff'; };
        dropZone.ondragleave = () => dropZone.style.borderColor = '#444';
        dropZone.ondrop = (e) => {
            e.preventDefault();
            processFile(e.dataTransfer.files[0]);
        };

        copyBtn.onclick = () => {
            output.select();
            document.execCommand('copy');
            alert('Base64 copied!');
        };
    </script>
</body>
</html>
